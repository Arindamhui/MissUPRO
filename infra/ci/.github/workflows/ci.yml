name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ── Lint & Typecheck ─────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run build

  # ── Unit & Integration Tests ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: missu
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: missu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U missu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://missu:test_password@localhost:5432/missu_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Run DB Migrations
        run: npm run db:migrate

      - name: Run Tests
        run: npm run test

  # ── Build ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Build All Packages
        run: npm run build

  # ── Docker Build & Push (main only) ─────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (main branch) ────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    outputs:
      deployed_sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set deployment metadata
        id: meta
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "Deploying API and Web with commit ${{ github.sha }}"

      - name: Deploy API
        env:
          IMAGE_URI: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
        run: |
          echo "Deploying API image $IMAGE_URI"
          if [ -f infra/scripts/deploy-api.sh ]; then
            chmod +x infra/scripts/deploy-api.sh
            ./infra/scripts/deploy-api.sh
          else
            echo "Create infra/scripts/deploy-api.sh (use env IMAGE_URI) for Railway/Fly/k8s deploy"
          fi

      - name: Deploy Web
        env:
          IMAGE_URI: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
        run: |
          echo "Deploying Web image $IMAGE_URI"
          if [ -f infra/scripts/deploy-web.sh ]; then
            chmod +x infra/scripts/deploy-web.sh
            ./infra/scripts/deploy-web.sh
          else
            echo "Create infra/scripts/deploy-web.sh (use env IMAGE_URI) for Web deploy"
          fi

